[env:esp32-c3-mini]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200

upload_speed  = 115200 


lib_deps =
    olikraus/U8g2 @ ^2.35.7
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
    -Os
